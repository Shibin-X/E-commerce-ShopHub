spring.application.name=ecommerce-backend

spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/ecommerce}

app.jwt.secret=${JWT_SECRET:your-256-bit-secret-key-change-in-production-must-be-at-least-32-chars}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

server.port=${PORT:8080}